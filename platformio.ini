[env:esp8266]
platform = espressif8266
board = esp12e
framework = arduino

lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.3
    bblanchon/ArduinoJson@^7.4.1
    https://github.com/tzapu/WiFiManager.git
    knolleary/PubSubClient@^2.8

monitor_speed = 74880
